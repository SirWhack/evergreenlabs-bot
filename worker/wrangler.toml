name = "evergreenlabs-bot-webhook"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Non-secret config. Secrets (GITHUB_WEBHOOK_SECRET, BOT_POLL_TOKEN) are set via
# `wrangler secret put` and never live in this file.
[vars]
GITHUB_USERNAME = "SirWhack"

# KV namespace for the event queue + replay-dedup. Create with:
#   wrangler kv namespace create EVENTS
# then paste the returned id below.
[[kv_namespaces]]
binding = "EVENTS"
id = "9f6ebd92d2a5497fb9f5e196ce43608a"
